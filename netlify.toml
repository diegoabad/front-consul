# Netlify: build y publicación del frontend
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

# Recomendado: usar Node 20 LTS
[build.environment]
  NODE_VERSION = "20"

# Proxy de la API al servicio en Render (mismo origen → sin CORS).
# IMPORTANTE: la URL debe ser la del servicio que realmente existe en Render (GET /api/health = 200).
# Si cambiás de servicio en Render, actualizá también web/public/_redirects (se copia a dist/).
[[redirects]]
  from = "/api/*"
  to = "https://consul-mm-o0qk.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# =============================================================================
# VITE_API_URL (opcional si usás el proxy de arriba)
# =============================================================================
# Sin variable: el front usa origin + "/api" → este proxy → Render.
#
# Directo a Render (sin proxy): VITE_API_URL=https://TU-SERVICIO.onrender.com
# (sin /api al final; el build añade /api a la base). En Render: CORS_ORIGIN=https://tu-app.netlify.app
#
# Un 404 en OPTIONS en la pestaña Red suele ser URL equivocada (p. ej. API apuntando al dominio
# del front sin proxy) o proxy `to` mal; no suele ser “CORS roto” en Express.
#
# Tras cambiar variables: Clear cache and deploy site.
# =============================================================================
